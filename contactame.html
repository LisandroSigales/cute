<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contactame</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
      <nav class="barra1">
        <ul class="navegar">
            <li><a href="index.html" >Inicio</a></li>
            <li><a href="tienda.html">Tienda</a></li>
            <li><a href="contactame.html" class="si">Contactame</a></li>
        </ul>
      </nav>
       <div class="barra2">
        <div class="buscar">
            <input type="text" placeholder="Buscar..." class="barrabuscar">
            <button type="submit" class="lupa"><img src="Img/Lupa.png" alt="lupita"></button>
        </div>
        <div class="carrito">
            <a href="carrito.html" class="carro"><img src="Img/Carrito.png" alt="Carrito"></a>
        </div>
        </div>
    </header> 
    <div class="espacioheader"></div>
     <div class="contacto-container">
        <div class="contactotitulo">
            <h2>♡Escribime♡</h2>
        </div>
        <form class="formulario-box" netlify>
            <div class="fila-input">
                <div class="campo"><label>Nombre completo</label>
                    <input type="text" name="nombre" placeholder="nombre...">
                </div>
                <div class="campo"><label>Motivo</label>
                    <input type="text" name="motivo" placeholder="¿porque?">
                </div>
            </div>

            <div class="fila-input">
                <div class="campo"><label>Email</label>
                    <input type="email" name="email" placeholder="@mail.com">
                </div>
                <div class="campo">
                        <label for="telefono">Telefono</label>
                        <input type="tel" id="telefono" name="telefono" placeholder="Ej: 11 1234-5678" class="input-cute">
                </div>
            </div>

            <div class="campo-full">
                <label>mensaje</label>
                <textarea name="mensaje" placeholder="Texto..."></textarea>
            </div>

            <button type="submit" class="boton-enviar">Enviar</button>
        </form>

    </div>


    <footer>
        <div class="redes">
           <div class="instagram">
                    <a href="https://en.wikipedia.org/wiki/Instagram"class="instagram">
                    <img src="Img/instagram.png" alt="instagram">
                    <h2>@Cute.instagram</h2>
                    </a>
                </div>
                <div class="tiktok">
                    <a href="https://en.wikipedia.org/wiki/TikTok"class="tiktok">
                    <img src="Img/tik-tok.png" alt="tiktok">
                    <h2>@Cute.tiktok</h2>
                    </a>
                </div>
                <div class="facebook">
                    <a href="https://en.wikipedia.org/wiki/Facebook" class="facebook">
                    <img src="Img/facebook.png" alt="facebook">
                    <h2>@Cute.facebook</h2>
                    </a>
                </div>
          </div>
        </div>
        <div class="copy">
          Copyright © 2026 Cute! Accesories Store. Website by Lisandro Sigales • Todos los derechos reservados.
        </div>

    </footer>

</body>
</html>
