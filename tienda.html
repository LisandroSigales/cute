<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tienda</title>
  <link rel="stylesheet" href="style.css">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/dist/css/bootstrap.min.css" rel="stylesheet"
    integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
</head>

<body>
  <header>
    <nav class="barra1">
      <ul class="navegar">
        <li><a href="index.html">Inicio</a></li>
        <li><a href="tienda.html" class="si">Tienda</a></li>
        <li><a href="contactame.html">Contactame</a></li>
      </ul>
    </nav>
    <div class="barra2">
      <div class="buscar">
        <input type="text" placeholder="Buscar..." class="barrabuscar">
        <button type="submit" class="lupa"><img src="Img/Lupa.png" alt="lupita"></button>
      </div>
      <div class="carrito">
        <a href="carrito.html" class="carro"><img src="Img/Carrito.png" alt="Carrito"></a>
      </div>
    </div>
  </header>
  <div class="espacioheader"></div>




  <main class="tienda">

    <aside class="tienda-filtros">
      <div class="logo-tienda">
        <img src="Img/logo naranja 1_Mesa de trabajo 1.png" alt="Logo shop">
      </div>

      <div class="Filtrosdelatienda">
        <form class="filtros" netlify>
          <div class="campo">
            <label><strong>Accesorios</strong></label>
            <select name="accesorios" class="contenedorfiltro">
              <option value="todos">Todos</option>
              <option value="monos">Moños</option>
              <option value="panuelos">Pañuelos</option>
              <option value="hebillas">Hebillas</option>
              <option value="corbatas">Corbatas</option>
              <option value="pines">Pines</option>
              <option value="peluches">Peluches</option>
            </select>

          </div>

          <div class="campo">
            <label><strong>Filtros</strong></label>
            <select name="filtros" class="contenedorfiltro">
              <option value="recientes">Recientes</option>
              <option value="antiguos">Antiguos</option>
              <option value="menoscosto">Menos costo</option>
              <option value="mascosto">Más costo</option>
              <option value="masamados">Más amados</option>
            </select>
          </div>

          <div class="campo">
            <label><strong>Colores</strong></label>
            <select name="colores" class="contenedorfiltro">
              <option value="rojo">Rojo</option>
              <option value="azul">Azul</option>
              <option value="dorado">Dorado</option>
              <option value="plateado">Plateado</option>
              <option value="negro">Negro</option>
              <option value="blanco">Blanco</option>
            </select>
          </div>

          <div class="campo">
            <label><strong>Material</strong></label>
            <select name="material" class="contenedorfiltro">
              <option value="satin">Satín</option>
              <option value="algodon">Algodón</option>
              <option value="oro">Oro</option>
              <option value="plata">Plata</option>
              <option value="fantasia">Fantasía</option>
              <option value="plastico">Plastico</option>
            </select>

          </div>
      </div>

    </aside>

    <div class="tienda-productos">

      <div class="producto">
        <a href="producto.html">
          <div class="fotoproducto">
            <img src="Img/moño negro.png" alt="Moño negro">
          </div>
        </a>
        <h3 class="producto-nombre">Moño negro</h3>
      </div>

      <div class="producto">
        <a href="producto.html">
          <div class="fotoproducto">
            <img src="Img/calavera.png" alt="Hebillas calaveras">
          </div>
        </a>
        <h3 class="producto-nombre">Hebillas calabazas</h3>
        <h3 class="producto-precio">Hebillas calabazas</h3>
      </div>

      <div class="producto">
        <a href="producto.html">
          <div class="fotoproducto">
            <img src="Img/murcielago.png" alt="Colgante murciélago">
          </div>
        </a>
        <h3 class="producto-nombre">Colgante murciélago</h3>
      </div>
    </div>

  </main>

  <footer>
    <div class="redes">
      <div class="instagram">
        <img src="Img/instagram.png" alt="instagram">
        <h2>@Cute.instagram</h2>
      </div>
      <div class="tiktok">
        <img src="Img/tik-tok.png" alt="tiktok">
        <h2>@Cute.tiktok</h2>
      </div>
      <div class="facebook">
        <img src="Img/facebook.png" alt="facebook">
        <h2>@Cute.facebook</h2>
      </div>
    </div>
    <div class="copy">
      Copyright © 2026 Cute! Accesories Store. Website by Lisandro Sigales • Todos los derechos reservados.
    </div>

  </footer>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
    integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
    crossorigin="anonymous"></script>
  <script src="tienda.js"></script>
</body>

</html>
